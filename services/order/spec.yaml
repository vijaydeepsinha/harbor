openapi: 3.0.3
info:
  title: Order Service
  version: 1.0.0
  description: Order management — place and track orders

servers:
  - url: http://localhost:3002

paths:
  /orders:
    post:
      operationId: placeOrder
      summary: Place a new order
      description: Creates a new order for a product. Returns the order ID and confirmation details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity]
              properties:
                productId:
                  type: string
                  description: Product ID from the product service (e.g. p001)
                quantity:
                  type: integer
                  minimum: 1
                  description: Number of units to order
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Missing required fields

  /orders/{orderId}:
    get:
      operationId: getOrder
      summary: Get order status
      description: Returns current status and details for an existing order.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
          description: Order ID returned when order was placed (e.g. ord-0001)
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found

components:
  schemas:
    Order:
      type: object
      properties:
        orderId:
          type: string
        productId:
          type: string
        quantity:
          type: integer
        status:
          type: string
          enum: [confirmed, processing, shipped, delivered]
        createdAt:
          type: string
          format: date-time
        estimatedDelivery:
          type: string
